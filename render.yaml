databases:
  - name: Love_Letter_Backend_Db
    plan: free
    databaseName: LoveLetterBackend
    user: LoveLetterBackend

services:
  - type: web
    plan: free
    name: Love_Letter_Backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn Love_Letter_Backend.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: Love_Letter_Backend_Db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
